    <!-- TO ENABLE / DISABLE THE LOGIN BUTTON BASE ON CHECKBOX IF IT IS CHECKED-->
    <script>
      function checkChange() {
        let loginbtn = document.getElementById("button-login");
        const checkbox = document.getElementById("gridCheck1");
        if (checkbox.checked) {
          console.log("Checkbox is checked.");
          loginbtn.classList.remove("btn-disable-login");
          loginbtn.disabled = false;
        } else {
          console.log("Checkbox is not checked.");
          loginbtn.classList.add("btn-disable-login");
          loginbtn.disabled = true;
        }
      }

      //  TO CHECK IF THE BUTTON CLICKED
      function buttonClick() {
        let loginbtn = document.getElementById("button-login");
        if (!loginbtn.disabled) {
          // alert('Button clicked!');
          console.log("button clicked");
        }
      }
    </script>
